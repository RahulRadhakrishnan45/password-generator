<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-800 text-white flex items-center justify-center min-h-screen m-0">
  <div class="flex items-center justify-center min-h-screen">
    <div class="bg-gray-600 p-6 rounded-2xl shadow-lg w-96 ">
      <h1 class="text-2xl font-bold mb-4 text-center text-white">Password Generator</h1>

      <!-- Output -->
      <div class="flex mb-4">
        <input id="password" type="text" readonly
          class="w-full p-2 rounded-l-lg text-black">
        <button onclick="copyPassword()"
          class="bg-blue-500 px-4 rounded-r-lg text-white">Copy</button>
      </div>

      <!-- Length -->
      <div class="mb-4">
        <label>Password Length: <span id="lengthVal">12</span></label>
        <input type="range" min="4" max="30" value="12"
          class="w-full"
          oninput="updateLength(this.value)">
      </div>

      <!-- Options -->
      <div class="space-y-2 mb-4">
        <label><input type="checkbox" id="upper" checked> Uppercase</label><br>
        <label><input type="checkbox" id="lower" checked> Lowercase</label><br>
        <label><input type="checkbox" id="number" checked> Numbers</label><br>
        <label><input type="checkbox" id="symbol"> Symbols</label>
      </div>

      <!-- Button -->
      <button onclick="generatePassword()"
        class="w-full bg-green-500 p-2 rounded-lg font-semibold text-white">
        Generate Password
      </button>
    </div>
  </div>
</body>

<script>
    
    function updateLength(val){
      document.getElementById('lengthVal').innerText=val
    }

    function generatePassword(){
      const length = document.querySelector("input[type='range']").value

      const upper = document.getElementById('upper').checked
      const lower = document.getElementById('lower').checked
      const number = document.getElementById('number').checked
      const symbol = document.getElementById('symbol').checked

      const upperChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'
      const lowerChars = 'abcdefghijklmnopqrstuvwxyz'
      const numberChars = '0123456789'
      const symbolChars = '!@#$%^&*()_+[]{}|;:,.<>?'

      let allChars = ''
      if(upper) allChars += upperChars
      if(lower) allChars += lowerChars
      if(number) allChars += numberChars
      if(symbol) allChars += symbolChars

      if(allChars === ''){
        alert('Select atleast one option')
        return
      }

      let password = ''
      for(let i=0;i<length;i++) {
        password += allChars[Math.floor(Math.random() * allChars.length)]
      }
      document.getElementById('password').value = password
    }

    function copyPassword(){
      const passwordField = document.getElementById('password')
      if(passwordField.value === '') {
        alert('No password found for copying')
        return
      }
      passwordField.select()
      document.execCommand('copy')
      alert('copied')
    }

  </script>
